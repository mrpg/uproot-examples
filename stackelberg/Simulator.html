<button class="btn btn-outline-secondary btn-sm mt-2" type="button" data-bs-toggle="collapse" data-bs-target="#simCollapse">
    Try the simulator
</button>

<div class="collapse mt-2" id="simCollapse">
    <div class="card card-body" x-data="{
        leader: '', follower: '',
        get ready() { return this.leader !== '' && this.follower !== '' },
        get total() { return this.ready ? Number(this.leader) + Number(this.follower) : null },
        get price() { return this.ready ? Math.max(0, 100 - this.total) : null },
        get leaderEarnings() { return this.ready ? this.price * Number(this.leader) : null },
        get followerEarnings() { return this.ready ? this.price * Number(this.follower) : null }
    }">
        <div class="row g-2 align-items-center mb-3">
            <div class="col-auto">
                <label class="col-form-label fw-semibold">First mover’s units</label>
            </div>
            <div class="col-auto">
                <input class="form-control" type="number" x-model="leader" min="0" max="100" style="width: 6rem;">
            </div>
            <div class="col-auto ms-3">
                <label class="col-form-label fw-semibold">Second mover’s units</label>
            </div>
            <div class="col-auto">
                <input class="form-control" type="number" x-model="follower" min="0" max="100" style="width: 6rem;">
            </div>
        </div>
        <hr class="my-2">
        <div class="row text-center">
            <div class="col">
                <div class="text-muted small">Total units</div>
                <div class="fs-5 fw-bold" x-text="ready ? total : '—'"></div>
            </div>
            <div class="col">
                <div class="text-muted small">Price</div>
                <div class="fs-5 fw-bold" x-text="ready ? '$' + price : '—'"></div>
            </div>
            <div class="col">
                <div class="text-muted small">First mover’s earnings</div>
                <div class="fs-5 fw-bold" x-text="ready ? '$' + leaderEarnings : '—'"></div>
            </div>
            <div class="col">
                <div class="text-muted small">Second mover’s earnings</div>
                <div class="fs-5 fw-bold" x-text="ready ? '$' + followerEarnings : '—'"></div>
            </div>
        </div>
    </div>
</div>
