{% extends "Base.html" %}
{% set buttons = False %}

{% block head %}

<style>
#order-book-table th, #order-book-table td {
    text-align: right;
    padding: 0.25rem 0.5rem;
    font-variant-numeric: tabular-nums;
}
#order-book-table .ask-row {
    color: #dc3545;
}
#order-book-table .bid-row {
    color: #198754;
}
#order-book-table .spread-row td {
    text-align: center;
    color: #6c757d;
    font-style: italic;
    border-top: 2px solid #dee2e6;
    border-bottom: 2px solid #dee2e6;
}
#trades-list .trade-item {
    font-variant-numeric: tabular-nums;
}
</style>

{% endblock head %}

{% block main %}

<div x-data="marketApp()" x-init="init()">

<div class="row mb-4">
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h6 class="card-title text-muted mb-2">Portfolio</h6>
                <div class="d-flex justify-content-between">
                    <div>
                        <small class="text-muted">Cash</small>
                        <div class="fw-bold" :class="{'text-success': parseFloat(cash) > 0, 'text-danger': parseFloat(cash) < 0}">
                            <span x-text="uproot.formatForInterface('price', cash)"></span>
                        </div>
                    </div>
                    <div>
                        <small class="text-muted">Stock</small>
                        <div class="fw-bold" x-text="uproot.formatForInterface('quantity', stock)"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h6 class="card-title text-muted mb-2">New Order</h6>
                <div class="row g-2 align-items-end">
                    <div class="col-auto">
                        <label class="form-label small">Type</label>
                        <select class="form-select form-select-sm" x-model="orderType">
                            <option value="limit">Limit</option>
                            <option value="market">Market</option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <label class="form-label small">Side</label>
                        <select class="form-select form-select-sm" x-model="orderSide">
                            <option value="buy">Buy</option>
                            <option value="sell">Sell</option>
                        </select>
                    </div>
                    <div class="col-auto" x-show="orderType === 'limit'">
                        <label class="form-label small">Price ($)</label>
                        <input type="number" class="form-control form-control-sm" x-model="orderPrice" step="0.01" min="0.01" placeholder="0.00" style="width: 100px;">
                    </div>
                    <div class="col-auto">
                        <label class="form-label small">Quantity</label>
                        <input type="number" class="form-control form-control-sm" x-model="orderQty" min="1" step="1" placeholder="1" style="width: 80px;">
                    </div>
                    <div class="col-auto">
                        <button class="btn btn-sm" :class="orderSide === 'buy' ? 'btn-success' : 'btn-danger'" @click="submitOrder()" :disabled="submitting">
                            <span x-show="!submitting" x-text="orderSide === 'buy' ? 'Buy' : 'Sell'"></span>
                            <span x-show="submitting" class="spinner-border spinner-border-sm"></span>
                        </button>
                    </div>
                </div>
                <div x-show="error" class="text-danger small mt-1" x-text="error"></div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-7">
        <div class="card">
            <div class="card-body">
                <h6 class="card-title text-muted mb-2">Order Book</h6>
                <table class="table table-sm mb-0" id="order-book-table">
                    <thead>
                        <tr>
                            <th>Price</th>
                            <th>Quantity</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="level in book.asks.slice().reverse()" :key="level.price">
                            <tr class="ask-row">
                                <td x-text="uproot.formatForInterface('price', level.price)"></td>
                                <td x-text="level.quantity"></td>
                            </tr>
                        </template>
                        <tr class="spread-row">
                            <td colspan="2" x-text="spreadText()"></td>
                        </tr>
                        <template x-for="level in book.bids" :key="level.price">
                            <tr class="bid-row">
                                <td x-text="uproot.formatForInterface('price', level.price)"></td>
                                <td x-text="level.quantity"></td>
                            </tr>
                        </template>
                        <template x-if="book.asks.length === 0 && book.bids.length === 0">
                            <tr><td colspan="2" class="text-center text-muted">No orders</td></tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="col-md-5">
        <div class="card mb-3">
            <div class="card-body">
                <h6 class="card-title text-muted mb-2">My Orders</h6>
                <template x-if="myOrders.length === 0">
                    <p class="text-muted small mb-0">No active orders</p>
                </template>
                <div class="list-group list-group-flush">
                    <template x-for="order in myOrders" :key="order.id">
                        <div class="list-group-item d-flex justify-content-between align-items-center px-0 py-1">
                            <span class="small">
                                <span :class="order.side === 'buy' ? 'text-success' : 'text-danger'" x-text="order.side.toUpperCase()"></span>
                                <span x-text="order.quantity"></span> @
                                <span x-text="uproot.formatForInterface('price', order.price)"></span>
                            </span>
                            <button class="btn btn-outline-secondary btn-sm py-0 px-1" @click="cancelOrder(order.id)" :disabled="cancelling === order.id">
                                &times;
                            </button>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h6 class="card-title text-muted mb-2">Recent Trades</h6>
                <template x-if="trades.length === 0">
                    <p class="text-muted small mb-0">No trades yet</p>
                </template>
                <div id="trades-list" style="max-height: 200px; overflow-y: auto;">
                    <template x-for="(trade, i) in trades.slice().reverse()" :key="i">
                        <div class="trade-item small border-bottom py-1">
                            <span x-text="trade.quantity"></span> @
                            <span x-text="uproot.formatForInterface('price', trade.price)"></span>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</div>

</div>

{% endblock main %}

{% block late %}

<script src="{{ appstatic('market.js') }}"></script>

{% endblock late %}
