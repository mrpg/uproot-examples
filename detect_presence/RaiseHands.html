{% extends "Base.html" %}
{% set buttons = False %}

{% block head %}
<style>
    .presence-card {
        cursor: pointer;
        transition: all 0.25s ease;
    }

    .presence-card-body {
        width: 320px;
        height: 320px;
    }

    .presence-emoji {
        font-size: 4rem;
        line-height: 1;
    }
</style>
{% endblock head %}


{% block main %}

<div x-data="{
    present: {{ player.get('present', false) | tojson }},
    loading: false,
    toggle() {
        this.loading = true;
        uproot.invoke('set_presence', !this.present).then((v) => {
            this.present = v;
            this.loading = false;
        });
    }
}" class="d-flex flex-column align-items-center my-4">

    <p class="my-4 text-center text-muted">Click below to let us know you’re here.</p>

    <div @click="toggle()" role="button" tabindex="0" @keydown.enter="toggle()" @keydown.space.prevent="toggle()"
         :class="present ? 'border border-success shadow' : 'border shadow-sm'"
         class="card mx-auto text-center presence-card"
         :style="loading ? 'opacity: 0.6; pointer-events: none;' : ''">
        <div class="card-body d-flex flex-column align-items-center justify-content-center presence-card-body">
            <div class="mb-3 presence-emoji" x-text="present ? '👍' : '👋'"></div>
            <h4 :class="present ? 'text-success' : 'text-body-secondary'" class="card-title mb-1"
                x-text="present ? 'I’m here!' : 'Click to check in'"></h4>
        </div>
    </div>

    <p class="mt-4 text-muted" x-show="present">Please wait while others check in.</p>
</div>

{% endblock main %}
