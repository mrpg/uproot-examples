<button type="button" class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#simulatorModal">
    Open simulator
</button>

<div class="modal fade" id="simulatorModal" tabindex="-1" role="dialog" aria-labelledby="simulatorModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title fs-5" id="simulatorModalLabel">Simulator</span>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <fieldset class="row mb-3">
                    <legend class="col-sm-4 col-form-label pt-0">You</legend>
                    <div class="col-sm-8">
                        {% for action in player.context.actions %}
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="simMe" id="simMe{{ action }}" value="{{ action }}">
                            <label class="form-check-label" for="simMe{{ action }}">Action {{ action }}</label>
                        </div>
                        {% endfor %}
                    </div>
                </fieldset>

                <fieldset class="row mb-3">
                    <legend class="col-sm-4 col-form-label pt-0">Other participant</legend>
                    <div class="col-sm-8">
                        {% for action in player.context.actions %}
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="simOther" id="simOther{{ action }}" value="{{ action }}">
                            <label class="form-check-label" for="simOther{{ action }}">Action {{ action }}</label>
                        </div>
                        {% endfor %}
                    </div>
                </fieldset>

                <hr>

                <div class="row">
                    <div class="col-6 text-center">
                        <div class="text-muted small">Your earnings</div>
                        <div class="fs-4 fw-bold" id="simMyPayoff">&mdash;</div>
                    </div>

                    <div class="col-6 text-center">
                        <div class="text-muted small">Other's earnings</div>
                        <div class="fs-4 fw-bold" id="simOtherPayoff">&mdash;</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script>
    uproot.onReady(() => {
        const actions = {{ player.context.actions_json | safe }};
        const matrix = {{ player.context.matrix_json | safe }};

        function update() {
            const me = document.querySelector('input[name="simMe"]:checked');
            const other = document.querySelector('input[name="simOther"]:checked');
            if (!me || !other) {
                I("simMyPayoff").textContent = "—";
                I("simOtherPayoff").textContent = "—";
                return;
            }
            const i = actions.indexOf(me.value);
            const j = actions.indexOf(other.value);
            const cell = matrix[i][j];
            I("simMyPayoff").textContent = cell[0];
            I("simOtherPayoff").textContent = cell[1];
        }

        document.querySelectorAll('input[name="simMe"], input[name="simOther"]').forEach(r => {
            r.addEventListener("change", update);
        });
    });
</script>
