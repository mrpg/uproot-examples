<table class="table table-bordered w-auto mb-4">
    <thead>
        <tr>
            <th></th>
            {% for action in player.context.actions %}
            <th>Other: {{ action }}</th>
            {% endfor %}
        </tr>
    </thead>
    <tbody>
        {% for row in player.context.matrix %}
        <tr>
            <th>You: {{ player.context.actions[loop.index0] }}</th>
            {% for cell in row %}
            <td>{{ cell[0] }}, {{ cell[1] }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
    </tbody>
</table>
